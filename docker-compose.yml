name: portfolio-dev

# Development stack: Postgres + Next.js dev server (Turbopack hot reload).
# Usage:  docker compose up --build
#   Public → http://localhost:3000/en   ·   Admin → http://localhost:3000/admin/login

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pw
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    # Loads NEXTAUTH_SECRET / ADMIN_* etc. from .env; DATABASE_URL is overridden
    # below to point at the `db` service instead of localhost.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:pw@db:5432/portfolio
    ports:
      - "3000:3000"
    volumes:
      - .:/app                       # live source for hot reload
      - node_modules:/app/node_modules   # keep the image's linux node_modules
      - next_cache:/app/.next            # don't share the host's .next
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "node_modules/.bin/prisma migrate deploy &&
             node_modules/.bin/tsx prisma/seed.ts &&
             node_modules/.bin/next dev --turbopack -H 0.0.0.0 -p 3000"

volumes:
  pgdata:
  node_modules:
  next_cache:
